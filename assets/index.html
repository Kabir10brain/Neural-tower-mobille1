<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KABIR TOWER • MOBILE HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --glow: #38bdf8;
    --text: #67e8f9;
    --bg: #020617;
    --panel: rgba(13,25,48,0.95);
    --border: rgba(56,189,248,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; touch-action: manipulation; }

  body {
    font-family: 'Orbitron', sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow-x: hidden;
    overflow-y: auto; /* Allow scrolling on mobile */
    background-image: radial-gradient(circle at center, rgba(56,189,248,0.08) 0%, transparent 70%);
  }

  /* ── MOBILE BOOT ── */
  #boot {
    position: fixed; inset: 0; background: #020617;
    z-index: 9999; display: flex; flex-direction: column;
    justify-content: center; align-items: center; padding: 20px;
  }
  .boot-line { font-size: 14px; color: var(--glow); margin-bottom: 10px; opacity: 0; }
  .boot-line.show { opacity: 1; transition: 0.5s; }

  /* ── MOBILE TOOLBAR ── */
  #toolbar {
    position: sticky; top: 0; height: 50px;
    background: rgba(2,6,23,0.98); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 10px; overflow-x: auto;
    z-index: 5000; gap: 8px;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .tb-btn {
    flex: 0 0 auto; background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; font-size: 10px; border-radius: 4px;
    font-family: 'Orbitron';
  }

  /* ── MOBILE WINDOWS ── */
  .window {
    position: relative; /* Stacks vertically on mobile */
    width: 94% !important; margin: 15px auto;
    left: 0 !important; top: 0 !important; right: 0 !important;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; display: flex; flex-direction: column;
  }
  .win-header {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(56,189,248,0.1); padding: 12px; border-bottom: 1px solid var(--border);
  }
  .win-title { font-size: 10px; letter-spacing: 2px; color: var(--glow); font-weight: 700; }
  .win-body { padding: 15px; }

  /* ── UI ELEMENTS ── */
  .iui { background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text); padding: 12px; width: 100%; border-radius: 6px; font-family: 'Orbitron'; font-size: 12px; margin-bottom: 10px; }
  .btn { background: transparent; border: 1px solid var(--glow); color: var(--glow); padding: 12px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 11px; border-radius: 6px; }
  .timer-big { font-size: 48px; text-align: center; color: var(--glow); margin: 10px 0; }
  
  /* Spotify Mobile Adjust */
  .spotify-container { border-radius: 8px; overflow: hidden; height: 80px; }
</style>
</head>
<body onload="runMobileBoot()">

<div id="boot">
  <div class="boot-line" id="b1">> MOBILE UPLINK...</div>
  <div class="boot-line" id="b2">> SYNCING TOUCH INTERFACE...</div>
  <div class="boot-line" id="b3">> KABIR TOWER ACTIVE.</div>
</div>

<div id="toolbar">
  <button class="tb-btn" onclick="scrollToWin('win-timer')">CHRONO</button>
  <button class="tb-btn" onclick="scrollToWin('win-jarvis')">NEURAL</button>
  <button class="tb-btn" onclick="scrollToWin('win-tasks')">OBJECTIVES</button>
  <button class="tb-btn" onclick="scrollToWin('win-audio')">AUDIO</button>
</div>

<div class="window" id="win-timer">
  <div class="win-header"><span class="win-title">CHRONOGRAPH</span></div>
  <div class="win-body">
    <div class="timer-big" id="display">25:00</div>
    <button class="btn" onclick="toggleTimer()">START SESSION</button>
  </div>
</div>

<div class="window" id="win-jarvis">
  <div class="win-header"><span class="win-title">J.A.R.V.I.S. MOBILE</span></div>
  <div class="win-body">
    <div id="jarvisBox" style="font-size:11px; margin-bottom:10px; min-height:40px; opacity:0.8;">Neural link ready.</div>
    <input class="iui" id="userInput" placeholder="COMMAND...">
    <button class="btn" onclick="askJarvis()">SEND</button>
  </div>
</div>

<div class="window" id="win-audio">
  <div class="win-header"><span class="win-title">MISSION AUDIO</span></div>
  <div class="win-body">
    <div class="spotify-container">
      <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Ueb9W7V3xg" width="100%" height="80" frameBorder="0" allow="encrypted-media"></iframe>
    </div>
  </div>
</div>

<script>
const KEY = "YOUR_API_KEY_HERE";

function runMobileBoot() {
  setTimeout(() => document.getElementById('b1').classList.add('show'), 400);
  setTimeout(() => document.getElementById('b2').classList.add('show'), 900);
  setTimeout(() => document.getElementById('b3').classList.add('show'), 1400);
  setTimeout(() => document.getElementById('boot').style.display = 'none', 2500);
}

function scrollToWin(id) {
  document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

async function askJarvis() {
  const inp = document.getElementById('userInput');
  const box = document.getElementById('jarvisBox');
  const q = inp.value; if(!q) return;
  box.textContent = 'UPLINKING...';
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: q }] }] })
    });
    const d = await res.json();
    box.textContent = d.candidates[0].content.parts[0].text;
    inp.value = '';
  } catch (e) { box.textContent = 'UPLINK ERROR.'; }
}

// Basic Timer Logic
let timeLeft = 1500, ticking = false;
function toggleTimer() {
  if(!ticking) {
    ticking = setInterval(() => {
      timeLeft--;
      let m = Math.floor(timeLeft/60), s = timeLeft%60;
      document.getElementById('display').textContent = `${m}:${s<10?'0':''}${s}`;
    }, 1000);
  }
}
</script>
</body>
</html>
