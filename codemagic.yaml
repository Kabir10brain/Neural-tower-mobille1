workflows:
  ios-capacitor-workflow:
    name: Neural Tower iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Build Xcode Project
        script: |
          cd ios/App
          xcodebuild build -scheme App -allowProvisioningUpdates
    artifacts:
      - ios/App/build/Outputs/**/*.ipa
